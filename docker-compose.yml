services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      PROJECTS_DIR: /app/projects
    ports:
      - "${HOST_BIND:-127.0.0.1}:${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./projects:/app/projects
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
      VITE_DEV_HOST: 0.0.0.0
    ports:
      - "${HOST_BIND:-127.0.0.1}:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    command: npm run dev
